<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.booking-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Travel Booking Form</h2>

<div class="row justify-content-center">

<div class="col-md-6 booking-box">

<form>

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="tel" class="form-control" placeholder="Enter phone number">
</div>

<div class="mb-3">
<label>Select Package</label>
<select class="form-control">
<option>Manali</option>
<option>Goa</option>
<option>Kashmir</option>
<option>Shimla</option>
<option>Rajasthan</option>
<option>Kerala</option>
</select>
</div>

<div class="mb-3">
<label>Number of Persons</label>
<input type="number" class="form-control">
</div>

<div class="mb-3">
<label>Travel Date</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" class="form-control" placeholder="Enter pickup location">
</div>

<button class="btn btn-success w-100">Confirm Booking</button>

</form>

</div>

</div>

</div>

</body>
</html>
